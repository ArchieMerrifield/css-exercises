<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="oddNumber">Number 1 - I'm a class!</p>
    <div id="num2">Number 2 - I'm one ID.</div>
    <p class="oddNumber butCooler">Number 3 - I'm a class, but cooler!</p>
    <div id="num4">Number 4 - I'm another ID.</div> <!--The solution uses the butCooler class here as well, because the font-size wants to be 24px, same as element 3.-->
    <p class="oddNumber">Number 5 - I'm a class!</p>
  </body>
</html>
